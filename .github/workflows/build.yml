name: Container

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  meta:
    name: Compute Tags
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.image.outputs.tags }}
      version: ${{ steps.image.outputs.version }}
      is_release: ${{ steps.image.outputs.is_release }}
    steps:
      - name: Image Tags
        id: image
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            short_sha="${{ github.event.pull_request.head.sha }}"
            short_sha="${short_sha::12}"
          else
            short_sha="${GITHUB_SHA::12}"
          fi

          version=""
          is_release=false
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            pr_number="${{ github.event.pull_request.number }}"
            tags="pr-${pr_number},pr-${pr_number}-${short_sha}"
          else
            # CalVer release: push to main, weekly schedule, or manual run.
            version="v$(date -u +'%Y.%m.%d')-${short_sha}"
            tags="${version},latest,sha-${short_sha}"
            is_release=true
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          use: true

      - name: Per-Arch Image Tags
        id: image
        shell: bash
        env:
          TAGS: ${{ needs.meta.outputs.tags }}
        run: |
          arch_tags=""
          IFS=',' read -ra tag_list <<< "$TAGS"
          for tag in "${tag_list[@]}"; do
            if [[ -n "$arch_tags" ]]; then
              arch_tags+=","
            fi
            arch_tags+="${tag}-${{ matrix.arch }}"
          done

          echo "arch_tags=${arch_tags}" >> "$GITHUB_OUTPUT"

      - name: GHCR Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ steps.image.outputs.arch_tags }}
          platform: ${{ matrix.platform }}
          push: always
          runCmd: .devcontainer/scripts/verify-tools.sh

  manifest:
    name: Publish Manifest
    runs-on: ubuntu-latest
    needs: [meta, build]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          use: true

      - name: GHCR Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Manifests
        shell: bash
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAGS: ${{ needs.meta.outputs.tags }}
        run: |
          IFS=',' read -ra tag_list <<< "$TAGS"
          for tag in "${tag_list[@]}"; do
            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:${tag}" \
              "${IMAGE_NAME}:${tag}-amd64" \
              "${IMAGE_NAME}:${tag}-arm64"
          done

  release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: [meta, build, manifest]
    if: needs.meta.outputs.is_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Release Tag
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists, skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" "${GITHUB_SHA}" -m "Release ${VERSION}"
          git push origin "refs/tags/${VERSION}"
