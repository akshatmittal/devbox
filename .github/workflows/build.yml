name: Container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Image Tags
        id: image
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            short_sha="${{ github.event.pull_request.head.sha }}"
            short_sha="${short_sha::12}"
          else
            short_sha="${GITHUB_SHA::12}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            tags="pr-${short_sha}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags="${GITHUB_REF_NAME},latest,sha-${short_sha}"
          else
            tags="alpha,sha-${short_sha}"
          fi

          arch_tags=""
          IFS=',' read -ra tag_list <<< "$tags"
          for tag in "${tag_list[@]}"; do
            if [[ -n "$arch_tags" ]]; then
              arch_tags+=","
            fi
            arch_tags+="${tag}-${{ matrix.arch }}"
          done

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "arch_tags=${arch_tags}" >> "$GITHUB_OUTPUT"

      - name: GHCR Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ steps.image.outputs.arch_tags }}
          platform: ${{ matrix.platform }}
          push: always
          runCmd: .devcontainer/scripts/verify-tools.sh

  manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          use: true

      - name: Image Tags
        id: image
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            short_sha="${{ github.event.pull_request.head.sha }}"
            short_sha="${short_sha::12}"
          else
            short_sha="${GITHUB_SHA::12}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "tags=pr-${short_sha}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tags=${GITHUB_REF_NAME},latest,sha-${short_sha}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=alpha,sha-${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: GHCR Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Manifests
        shell: bash
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAGS: ${{ steps.image.outputs.tags }}
        run: |
          IFS=',' read -ra tag_list <<< "$TAGS"
          for tag in "${tag_list[@]}"; do
            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:${tag}" \
              "${IMAGE_NAME}:${tag}-amd64" \
              "${IMAGE_NAME}:${tag}-arm64"
          done
